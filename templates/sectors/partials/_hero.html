<section class="relative bg-cover bg-center h-[450px] md:h-[550px]" 
         style="background-image: url('{% if sector.hero_image %}{{ sector.hero_image.url }}{% endif %}');">
    <div class="absolute inset-0 bg-black/60"></div>
    <div class="relative text-center text-white max-w-3xl mx-auto px-6 pt-24">
        <h1 class="text-4xl md:text-5xl font-bold">
            {{ sector.name }}
        </h1>
        <p class="mt-4 text-xl">
            {{ sector.tagline }}
        </p>
    </div>
</section>
